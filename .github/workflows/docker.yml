name: Docker

on:
  push:
  schedule:
    - cron: 0 0 * * 0

permissions:
  packages: write

jobs:
  cmp:
    uses: WaterLemons2k/.github/.github/workflows/compare.yml@main
    with:
      new: $(curl -s https://api.github.com/users/81f9db2ec2/packages/container/danmakus-core-docker/versions | jq .[0].id)

  docker:
    needs: cmp
    if: needs.cmp.outputs.changed == 'true'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v6
        with:
          repository: 81f9db2ec2/danmakus-core-docker

      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: docker

      - name: Apply patch
        run: git apply docker/patches/0001-fix-eacces.patch

      - name: Get version
        id: ver
        run: echo "version=$(jq -r .version package.json)" >>"$GITHUB_OUTPUT"

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/wl2k/danmakus-core
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.ver.outputs.version }}
            type=sha

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@6
        with:
          context: ./danmakus-core
          push: true
          tags: ${{ steps.meta.outputs.tags }}
